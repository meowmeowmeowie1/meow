name: Build & Release QoLTweaks

on:
  push:
    branches:
      - claude/affectionate-johnson-sJ0GR
      - claude/plugin-button-selection-tracking-YWOuc
    paths-ignore:
      - 'pluginmaster.json'
      - 'README.md'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout (with submodules)
        uses: actions/checkout@v4
        with:
          submodules: recursive

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: 10.0.x

      # The csproj references the Dalamud assemblies from
      # $(HOME)/.xlcore/dalamud/Hooks/dev/ on Linux. The plugin targets
      # DalamudApiLevel 15, which is the current staging (stg) Dalamud.
      # If a future api bump is needed, change the URL below.
      - name: Fetch Dalamud (staging)
        run: |
          mkdir -p "$HOME/.xlcore/dalamud/Hooks/dev"
          curl -fsSL -o /tmp/dalamud.zip https://goatcorp.github.io/dalamud-distrib/stg/latest.zip
          unzip -o -q /tmp/dalamud.zip -d "$HOME/.xlcore/dalamud/Hooks/dev"

      - name: Build (Release)
        run: |
          set -o pipefail
          dotnet build WrathCombo/WrathCombo.csproj -c Release -p:EnableWindowsTargeting=true 2>&1 | tee build.log

      - name: Publish build log on failure
        if: failure()
        run: |
          git config user.name ci
          git config user.email ci@ci
          git checkout --orphan ci-logs
          git reset
          git add -f build.log
          git commit -m "build log run ${GITHUB_RUN_NUMBER}"
          git push -f -u origin ci-logs

      - name: Locate packaged zip
        id: pkg
        run: |
          zip=$(find . -name 'latest.zip' -path '*bin*' | head -n1)
          if [ -z "$zip" ]; then
            echo "Could not find DalamudPackager output (latest.zip)"; exit 1
          fi
          echo "Found: $zip"
          # Name the asset MyTweak.zip and tag it mytweak-v<version> so the
          # download links in pluginmaster.json resolve.
          cp "$zip" MyTweak.zip
          version=$(grep -oPm1 '(?<=<Version>)[^<]+' WrathCombo/WrathCombo.csproj)
          echo "version=$version" >> "$GITHUB_OUTPUT"
          echo "zip=MyTweak.zip" >> "$GITHUB_OUTPUT"

      - name: Publish release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: mytweak-v${{ steps.pkg.outputs.version }}
          name: MyTweak v${{ steps.pkg.outputs.version }}
          make_latest: true
          files: ${{ steps.pkg.outputs.zip }}
